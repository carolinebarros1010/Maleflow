<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>FemFlow • Flow Center</title>

  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/flowcenter.css">
</head>

<body>

<h1 id="tituloApp">
  FemFlow <span id="nivelTag"></span>
</h1>

<h3 id="tituloFlow">—</h3>
<p class="subtitle" id="subFlow">—</p>

<!-- ================================
     CICLO DE TREINO
================================= -->
<div class="training-cycle">
  <div class="training-cycle-header">
    <span id="cycleTitleLabel">Ciclo de treino</span>
    <span id="cycleType">—</span>
  </div>
  <div class="training-cycle-track" id="cycleTrack"></div>
</div>

<div class="current-phase" id="t_current">—</div>

<!-- NAV -->
<div class="toolbar">
  <button class="tool" id="toBreath">💨 —</button>
  <button class="tool" id="toTrain">🏃 —</button>
  <button class="tool" id="toExtraTrain">✨ —</button>
  <button class="tool" id="toEvolution">📈 —</button>
  <button class="tool" id="toEndurance">🏃‍♂️ Endurance</button>
  <button class="tool" id="toNextTreino">🗓️ Ver próximo treino</button>
</div>

<!-- MODAL DE NÍVEL -->
<div id="modal-nivel" class="modal-nivel oculto">
  <div class="modal-nivel-box">
    <h2>📊 Selecione seu nível</h2>

    <button class="nivel-btn" data-nivel="iniciante">Iniciante</button>
    <button class="nivel-btn" data-nivel="intermediaria">Intermediária</button>
    <button class="nivel-btn" data-nivel="avancada">Avançada</button>

    <button id="btnConfirmarNivel" class="nivel-confirmar">
      Confirmar nível
    </button>

    <button id="fecharNivel" class="nivel-fechar">Fechar</button>
  </div>
</div>

<!-- MODAL DE TREINO EXTRA -->
<div id="modal-extra" class="modal-extra oculto">
  <div class="modal-extra-box">
    <h2 id="extraTitle">✨ Treino Extra</h2>
    <p id="extraSub" class="modal-extra-sub">Escolha a área que deseja focar hoje.</p>

    <button class="extra-btn" data-extra-enfase="extra_superior">Superior</button>
    <button class="extra-btn" data-extra-enfase="extra_inferior">Inferior</button>
    <button class="extra-btn" data-extra-enfase="extra_abdomen">Abdômen</button>
    <button class="extra-btn" data-extra-enfase="extra_mobilidade">Mobilidade</button>

    <button id="fecharExtra" class="extra-close">Fechar</button>
  </div>
</div>

<!-- MODAL PRÓXIMO TREINO -->
<div id="modalProximoTreino" class="modal-proximo-overlay hidden" aria-hidden="true">
  <div class="modal-proximo-card" role="dialog" aria-modal="true">
    <h3 class="modal-proximo-title" id="modalProximoTitulo">Próximo treino</h3>
    <p class="modal-proximo-subtitle" id="modalProximoSub">
      Veja os exercícios para se programar.
    </p>
    <div class="modal-proximo-list-title" id="modalProximoListaTitulo">
      Treino de amanhã
    </div>
    <ul class="modal-proximo-list" id="modalProximoLista"></ul>
  </div>
</div>


<div id="ff-loading" class="ff-loading">
  <div class="ff-loading-box">
    <div class="ff-spinner"></div>
    <p>Carregando…</p>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script src="js/firebase-init.js?v=20250127"></script>
<script>
  if (firebase.auth) {
    firebase.auth().signInAnonymously().catch((err) => {
      console.warn("[FemFlow] Auth anônimo falhou:", err);
    });
  }
</script>

<script src="js/lang.js"></script>
<script src="maleflow-core.js"></script>
<script src="js/treino-engine.js"></script>
<script src="js/flowcenter.js"></script>

</body>
</html>
